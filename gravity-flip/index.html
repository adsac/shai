    background: rgba(0,255,68,0.35); border-color: rgba(0,255,68,0.7);
    color: #000; box-shadow: 0 0 15px rgba(0,255,68,0.3);

// ===== RESPONSIVE SIZING =====
let canvasScale = 1, canvasOffX = 0, canvasOffY = 0;
function resizeCanvas() {
    const vw = window.innerWidth, vh = window.innerHeight;
    // Reserve space for touch controls below canvas on touch devices
    const controlH = isTouch ? Math.min(90, vh * 0.18) : 0;
    const availH = vh - controlH;
    const s = Math.min(vw / W, availH / H);
    canvasScale = s;
    C.style.width = (W * s) + "px";
    C.style.height = (H * s) + "px";
    requestAnimationFrame(() => {
        const rect = C.getBoundingClientRect();
        canvasOffX = rect.left;
        canvasOffY = rect.top;
    });
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", () => setTimeout(resizeCanvas, 200));
document.addEventListener("fullscreenchange", () => setTimeout(resizeCanvas, 100));

const keys = {}, jp = {};
window.addEventListener("keydown", e => {
    if (!keys[e.code]) jp[e.code] = true;
    keys[e.code] = true;
    if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","ShiftLeft","ShiftRight"].includes(e.code)) e.preventDefault();
});
window.addEventListener("keyup", e => keys[e.code] = false);
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches || window.matchMedia('(display-mode: fullscreen)').matches;
const touchActive = {};
let isFullscreen = isStandalone;

function goFullscreen() {
    if (isFullscreen) return;
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen;
    if (rfs) {
        rfs.call(el).then(() => {
            isFullscreen = true;
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock("landscape").catch(()=>{});
            }
            setTimeout(resizeCanvas, 300);
        }).catch(()=>{});
    }
    if (isIOS && !isStandalone) {
        window.scrollTo(0, 1);
        setTimeout(() => { window.scrollTo(0, 0); resizeCanvas(); }, 100);
    }
}

if (isTouch) {
    const tcDiv = document.getElementById("touch-controls");
    tcDiv.style.display = "block";
    const tcBtns = tcDiv.querySelectorAll(".tc-btn");

    // Track touches on each button
    tcBtns.forEach(btn => {
        const key = btn.dataset.key;
        btn.addEventListener("touchstart", e => {
            e.preventDefault();
            if (!isFullscreen && !isStandalone) goFullscreen();
            touchActive[key] = true;
            keys[key] = true;
            jp[key] = true;
            btn.classList.add("active");
        }, { passive: false });
        btn.addEventListener("touchend", e => {
            e.preventDefault();
            touchActive[key] = false;
            keys[key] = false;
            btn.classList.remove("active");
        }, { passive: false });
        btn.addEventListener("touchcancel", e => {
            touchActive[key] = false;
            keys[key] = false;
            btn.classList.remove("active");
        });
    });

    // Canvas tap for title screen "any key"
    C.addEventListener("touchstart", e => {
        e.preventDefault();
        if (!isFullscreen && !isStandalone) goFullscreen();
        jp._touch = true;
    }, { passive: false });
}

    case "j": return keys.ArrowUp || keys.KeyW || keys.Space;
    case "jp": return jp.ArrowUp || jp.KeyW || jp.Space;
    case "f": return jp.ShiftLeft || jp.ShiftRight || jp.KeyF;
    case "re": return jp.KeyR;
    case "any": return Object.keys(jp).length > 0;
} return false; };

const overlap = (a,b) => a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;

// ===== GAME STATE =====
let state = "title", stateT = 0, lvlIdx = 0, gameTime = 0;
let flash = 0, deathFlash = 0, worldAngle = 0, targetAngle = 0;
let flipCount = 0, bestFlips = [];
let trail = [];
let levelDeaths = 0, levelTime = 0;
let totalScore = 0, levelScores = [];

// Score state
let scorePopups = [];

// Switch/gate runtime state
let switchTimers = [], gateOpen = [];

// Mover positions
let moverPos = [];

// ===== PLAYER =====
let P = {};
function resetP() {
    const lv = levels[lvlIdx];
    P = {
        x:lv.spawn[0]*T, y:lv.spawn[1]*T, w:16, h:22,
        vx:0, vy:0, gd: lv.grav,
        grounded:false, coyote:0, jbuf:0,
        flipCD:0, flips:0, alive:true,
        sx:1, sy:1, facing:1,
        invuln: 0, inGravZone: false, flipLocked: false,
        mouthOpen: 0,
    };
    trail = [];
    parts = [];
    worldAngle = P.gd > 0 ? 0 : Math.PI;
    targetAngle = worldAngle;
    flipCount = 0;
    levelDeaths = 0;
    levelTime = 0;

    // Init switch/gate state
    const sw = lv.switches || [];
    const gt = lv.gates || [];
    switchTimers = sw.map(() => 0);
    gateOpen = gt.map(() => false);

    // Init mover positions
    const mv = lv.movers || [];
    moverPos = mv.map(m => ({ x: m.x, y: m.y, prevX: m.x, prevY: m.y }));
}

function loadLvl(i) {
    lvlIdx = i; resetP(); state = "playing"; stateT = 0;
}

// ===== COLLISION =====
function getLvlRects() {
    const lv = levels[lvlIdx];
    const rects = [...lv.platforms, ...lv.spikes, lv.goal];
    // Add closed gates
    const gt = lv.gates || [];
    for (let i = 0; i < gt.length; i++) {
        if (!gateOpen[i]) rects.push({ x:gt[i].x, y:gt[i].y, w:gt[i].w, h:gt[i].h, type:"solid" });
    }
    // Add movers
    const mv = lv.movers || [];
    for (let i = 0; i < mv.length; i++) {
        rects.push({ x:moverPos[i].x, y:moverPos[i].y, w:mv[i].w, h:mv[i].h, type:"solid", isMover:true, moverIdx:i });
    }
    return rects;
}

function checkOneway(delta, axis) {
    const lv = levels[lvlIdx];
    const ows = lv.oneways || [];
    for (const ow of ows) {
        const owRect = { x:ow.x, y:ow.y, w:ow.w, h:ow.h };
        if (!overlap(P, owRect)) continue;
        // Only collide when moving against the one-way direction
        if (axis === "y") {
            if (ow.dir === "up" && delta > 0 && P.y + P.h - delta <= ow.y + 2) {
                P.y = ow.y - P.h;
                if (P.gd > 0) { P.grounded = true; landEffect(); }
                P.vy = 0;
                return true;
            }
            if (ow.dir === "down" && delta < 0 && P.y - delta >= ow.y + ow.h - 2) {
                P.y = ow.y + ow.h;
                if (P.gd < 0) { P.grounded = true; landEffect(); }
                P.vy = 0;
                return true;
            }
        }
    }
    return false;
}

let lastLandTime = 0;
function landEffect() {
    if (Math.abs(P.vy) > 200 && gameTime - lastLandTime > 0.3) {
        lastLandTime = gameTime;
        sLand();
        spawn(P.x+P.w/2, P.gd>0?P.y+P.h:P.y, 6, {spread:120,dirY:-P.gd*.5,col:"#0f4",sz:2,grav:300*P.gd});
        P.sx = 1.35; P.sy = .65;
    }
}

let carriedMoverIdx = -1;

function moveAxis(axis, delta) {
    if (Math.abs(delta) < .001) return;
    if (axis === "x") P.x += delta; else P.y += delta;

    const rects = getLvlRects();
    for (const b of rects) {
        if (!overlap(P, b)) continue;
        if (b.type === "spike") { if (P.invuln <= 0) { kill(); return; } else continue; }
        if (b.type === "goal") { win(); return; }

        if (axis === "x") {
            if (delta > 0) P.x = b.x - P.w;
            else P.x = b.x + b.w;
            P.vx = 0;
        } else {
            if ((delta > 0 && P.gd > 0) || (delta < 0 && P.gd < 0)) {
                if (!P.grounded) landEffect();
                P.grounded = true;
                if (b.isMover) carriedMoverIdx = b.moverIdx;
            }
            if (delta > 0) P.y = b.y - P.h; else P.y = b.y + b.h;
            P.vy = 0;
        }
    }

    // Check one-ways after normal collision
    if (axis === "y") checkOneway(delta, axis);
}

function kill() {
    if (!P.alive) return;
    P.alive = false;
    levelDeaths++;
    sDie();
    deathFlash = .2;
    // Square pixel explosion
    spawn(P.x+P.w/2, P.y+P.h/2, 25, {spread:350,vy:0,col:"#f44",sz:4,life:.5,grav:0});
    spawn(P.x+P.w/2, P.y+P.h/2, 15, {spread:200,vy:0,col:"#ff8",sz:3,life:.4,grav:0});
    setTimeout(() => { if (state==="playing") { resetDeathOnly(); } }, 400);
}

function resetDeathOnly() {
    const lv = levels[lvlIdx];
    const deaths = levelDeaths;
    const time = levelTime;
    P = {
        x:lv.spawn[0]*T, y:lv.spawn[1]*T, w:16, h:22,
        vx:0, vy:0, gd: lv.grav,
        grounded:false, coyote:0, jbuf:0,
        flipCD:0, flips:0, alive:true,
        sx:1, sy:1, facing:1,
        invuln: 0.3, inGravZone: false, flipLocked: false,
        mouthOpen: 0,
    };
    trail = [];
    parts = [];
    worldAngle = P.gd > 0 ? 0 : Math.PI;
    targetAngle = worldAngle;
    flipCount = 0;
    levelDeaths = deaths;
    levelTime = time;
}

function calcScore() {
    const lv = levels[lvlIdx];
    const base = 1000;
    const flipBonus = Math.max(0, ((lv.parFlips||0) - flipCount) * 50);
    const timeBonus = Math.max(0, 500 - Math.floor(levelTime) * 10);
    const deathBonus = levelDeaths === 0 ? 500 : 0;
    return { base, flipBonus, timeBonus, deathBonus, total: base + flipBonus + timeBonus + deathBonus };
}

function getGrade(score) {
    const lv = levels[lvlIdx];
    const maxScore = 1000 + (lv.parFlips||0)*50 + 500 + 500;
    const pct = score / maxScore;
    if (pct >= 0.9) return "S";
    if (pct >= 0.7) return "A";
    if (pct >= 0.5) return "B";
    return "C";
}

function win() {
    if (state !== "playing") return;
    sGoal();
    const sc = calcScore();
    levelScores[lvlIdx] = sc.total;
    totalScore += sc.total;
    state = "level_complete"; stateT = 0;
    if (!bestFlips[lvlIdx] || flipCount < bestFlips[lvlIdx]) bestFlips[lvlIdx] = flipCount;
    // Gold star burst
    spawn(P.x+P.w/2, P.y+P.h/2, 40, {spread:400,vy:-100,col:"#ff0",sz:4,life:.8,grav:-200});
    spawnText(P.x+P.w/2, P.y - 20, "+"+sc.total, "#ff0");
}

// ===== UPDATE =====
function update(dt) {
    stateT += dt;
    gameTime += dt;

    if (state === "title") {
        if (kd("any")) {
            ea();
            loadLvl(0); totalScore = 0; levelScores = [];
        }
        return;
    }

    if (state === "playing" && P.alive) {
        const lv = levels[lvlIdx];
        levelTime += dt;
        if (kd("re")) { resetP(); return; }

        // Update movers
        const mv = lv.movers || [];
        for (let i = 0; i < mv.length; i++) {
            const m = mv[i];
            moverPos[i].prevX = moverPos[i].x;
            moverPos[i].prevY = moverPos[i].y;
            moverPos[i].x = m.x + Math.sin(gameTime * m.speed + m.phase * Math.PI * 2) * m.range * m.dx;
            moverPos[i].y = m.y + Math.sin(gameTime * m.speed + m.phase * Math.PI * 2) * m.range * m.dy;
        }

        // Update switches
        const sw = lv.switches || [];
        const gt = lv.gates || [];
        for (let i = 0; i < sw.length; i++) {
            const s = sw[i];
            const pRect = { x:P.x, y:P.y, w:P.w, h:P.h };
            const sRect = { x:s.x, y:s.y, w:s.w, h:s.h };
            if (overlap(pRect, sRect)) {
                if (switchTimers[i] <= 0) sSwitch();
                switchTimers[i] = s.timer;
            }
            if (switchTimers[i] > 0) {
                switchTimers[i] -= dt;
                // Open matching gate
                for (let j = 0; j < gt.length; j++) {
                    if (gt[j].id === s.gateId) gateOpen[j] = switchTimers[i] > 0;
                }
            }
        }

        // Check gravity zones
        const gz = lv.gzones || [];
        P.inGravZone = false;
        P.flipLocked = false;
        for (const z of gz) {
            const zRect = { x:z.x, y:z.y, w:z.w, h:z.h };
            if (overlap(P, zRect)) {
                P.inGravZone = true;
                if (z.lockFlip) P.flipLocked = true;
                if (P.gd !== z.dir) {
                    P.gd = z.dir;
                    targetAngle = P.gd > 0 ? 0 : Math.PI;
                    worldAngle = targetAngle;
                }
            }
        }

        // Move
        let tx = 0;
        if (kd("l")) { tx = -260; P.facing = -1; }
        if (kd("r")) { tx = 260; P.facing = 1; }
        const acc = P.grounded ? 2400 : 1200;
        P.vx = tx ? approach(P.vx, tx, acc*dt) : approach(P.vx, 0, (P.grounded?2000:300)*dt);

        // Mouth animation
        P.mouthOpen = Math.abs(P.vx) > 50 ? (Math.sin(gameTime * 12) * 0.5 + 0.5) : 0;

        // Coyote + jump buffer
        P.coyote = P.grounded ? .1 : P.coyote - dt;
        if (kd("jp")) P.jbuf = .12;
        P.jbuf -= dt;

        // Jump
        if (P.jbuf > 0 && P.coyote > 0) {
            P.vy = -540 * P.gd;
            P.grounded = false; P.coyote = 0; P.jbuf = 0;
            P.sx = .75; P.sy = 1.3;
            sJump();
            spawn(P.x+P.w/2, P.gd>0?P.y+P.h:P.y, 4, {spread:80,dirY:P.gd,col:"#0f4",sz:3,grav:400*P.gd});
        }
        if (!kd("j") && P.vy * P.gd < 0) P.vy *= .88;

        // Gravity flip
        P.flipCD -= dt;
        if (kd("f") && lv.canFlip && P.flipCD <= 0 && !P.flipLocked) {
            P.gd *= -1;
            P.vy = P.gd * 200;
            P.flipCD = .15;
            P.grounded = false;
            flipCount++;
            P.sx = .6; P.sy = 1.5;
            targetAngle += Math.PI;
            flash = .2;
            sFlip();
            const cy = P.y + P.h/2;
            // Neon cyan/magenta ring
            spawn(P.x+P.w/2, cy, 18, {spread:250, dirY:P.gd, col:"#0ff", sz:4, life:.5, grav:600*P.gd});
            spawn(P.x+P.w/2, cy, 8, {spread:150, dirY:P.gd, col:"#f0f", sz:3, life:.4, grav:400*P.gd});
            for (let i=0;i<12;i++) {
                const ang = (i/12)*Math.PI*2;
                parts.push({ x:P.x+P.w/2, y:cy, vx:Math.cos(ang)*200, vy:Math.sin(ang)*200,
                    life:.3, max:.3, sz:3, col:i%2?"#0ff":"#f0f", grav:0 });
            }
        }

        // Gravity
        P.vy += 1600 * P.gd * dt;
        P.vy = clamp(P.vy, -700, 700);

        if (P.invuln > 0) P.invuln -= dt;

        // Carry on mover
        carriedMoverIdx = -1;
        P.grounded = false;
        moveAxis("x", P.vx * dt);
        if (!P.alive) return;
        moveAxis("y", P.vy * dt);
        if (!P.alive) return;

        // Apply mover carry
        if (carriedMoverIdx >= 0) {
            const mp = moverPos[carriedMoverIdx];
            P.x += mp.x - mp.prevX;
        }

        // Out of bounds
        if (P.y > 600 || P.y < -200) kill();

        // Trail
        trail.push({x:P.x, y:P.y, gd:P.gd, t:1});
        if (trail.length > 8) trail.shift();

        // Squash recovery
        P.sx = approach(P.sx, 1, 5*dt);
        P.sy = approach(P.sy, 1, 5*dt);

        // Running particles
        if (P.grounded && Math.abs(P.vx) > 100 && Math.random() < .3) {
            spawn(P.x+P.w/2, P.gd>0?P.y+P.h:P.y, 1, {spread:40,dirY:-P.gd*.3,col:"#0a4",sz:2,life:.2,grav:200*P.gd});
        }
    }

    worldAngle = lerp(worldAngle, targetAngle, Math.min(1, 12*dt));

    if (state === "level_complete" && stateT > 2.5) {
        if (kd("any") || stateT > 4) {
            if (lvlIdx+1 < levels.length) loadLvl(lvlIdx+1);
            else { state = "win"; stateT = 0; }
        }
    }

    if (state === "win" && kd("re")) { loadLvl(0); totalScore = 0; levelScores = []; }

    flash = Math.max(0, flash - dt*3);
    deathFlash = Math.max(0, deathFlash - dt*2);
    updateParts(dt);
}

// ===== RENDER (to off-screen buffer) =====
function drawBg(ctx) {
    // Deep space gradient
    const isFlipped = P.gd < 0;
    const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, W*0.7);
    g.addColorStop(0, isFlipped ? "#0d0018" : "#000810");
    g.addColorStop(1, "#000");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Animated stars
    for (const s of bgStars) {
        const twinkle = Math.sin(gameTime * s.spd * 2 + s.x * 0.3) * 0.4 + 0.6;
        ctx.globalAlpha = twinkle * 0.7;
        ctx.fillStyle = `hsl(${s.hue},40%,80%)`;
        ctx.fillRect(s.x, s.y, s.sz, s.sz);
        // Glow for bigger stars
        if (s.sz > 1.5) {
            ctx.globalAlpha = twinkle * 0.15;
            ctx.fillRect(s.x - 1, s.y - 1, s.sz + 2, s.sz + 2);
        }
    }
    ctx.globalAlpha = 1;

    // Floating ambient particles
    for (const p of ambParts) {
        p.x += p.vx * 0.016; p.y += p.vy * 0.016;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        p.life += 0.005;
        const a = Math.sin(p.life * 3) * 0.15 + 0.05;
        ctx.globalAlpha = a;
        ctx.fillStyle = `hsl(${p.hue},70%,60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Dot-matrix grid (subtle)
    ctx.fillStyle = isFlipped ? "rgba(255,100,200,0.02)" : "rgba(0,255,68,0.025)";
    for (let x = 0; x < W; x += 6) {
        for (let y = 0; y < H; y += 6) {
            ctx.fillRect(x, y, 1, 1);
        }
    }
}

function render() {
    const ctx = o$;
    const lv = levels[lvlIdx] || levels[0];

    drawBg(ctx);

    if (state === "title") { renderTitle(ctx); composite(); return; }

    const isFlipped = P.gd < 0;

    // Gravity zones with animated energy field
    const gz = lv.gzones || [];
    for (const z of gz) {
        const isUp = z.dir === -1;
        const zCol = isUp ? [128,0,255] : [255,200,0];

        // Animated energy fill
        for (let sy = z.y; sy < z.y + z.h; sy += 4) {
            const wave = Math.sin(gameTime * 4 + sy * 0.05) * 0.05 + 0.08;
            ctx.fillStyle = `rgba(${zCol[0]},${zCol[1]},${zCol[2]},${wave})`;
            ctx.fillRect(z.x, sy, z.w, 3);
        }
        // Glowing border
        ctx.shadowColor = isUp ? "#8000ff" : "#ffcc00";
        ctx.shadowBlur = 12;
        ctx.strokeStyle = isUp ? "rgba(160,60,255,0.6)" : "rgba(255,220,0,0.6)";
        ctx.lineWidth = 2;
        ctx.strokeRect(z.x, z.y, z.w, z.h);
        ctx.shadowBlur = 0;
        // Direction arrows with glow
        ctx.fillStyle = isUp ? "rgba(200,120,255,0.5)" : "rgba(255,230,50,0.5)";
        const arrowDir = isUp ? -1 : 1;
        for (let ax = z.x + 14; ax < z.x + z.w - 10; ax += 28) {
            for (let ay = z.y + 14; ay < z.y + z.h - 10; ay += 28) {
                const bob = Math.sin(gameTime * 3 + ax * 0.1) * 4;
                ctx.beginPath();
                ctx.moveTo(ax, ay + arrowDir * 7 + bob);
                ctx.lineTo(ax - 6, ay - arrowDir * 5 + bob);
                ctx.lineTo(ax + 6, ay - arrowDir * 5 + bob);
                ctx.fill();
            }
        }
        if (z.lockFlip) {
            ctx.fillStyle = isUp ? "rgba(200,120,255,0.7)" : "rgba(255,230,50,0.7)";
            ctx.font = "bold 11px monospace";
            ctx.textAlign = "center";
            ctx.fillText("\u{1F512} LOCKED", z.x + z.w/2, z.y + z.h/2 + 4);
        }
    }

    // Platforms with neon glow
    for (const p of lv.platforms) {
        const isWall = p.h > p.w * 1.5;
        const col = isWall ? "#2266ff" : "#00ff55";
        const glowCol = isWall ? "#0044ff" : "#00ff44";

        // Neon glow
        ctx.shadowColor = glowCol;
        ctx.shadowBlur = 8;
        ctx.fillStyle = "#000";
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.shadowBlur = 0;

        // Body with gradient
        const pg = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
        pg.addColorStop(0, col);
        pg.addColorStop(0.5, isWall ? "#1144aa" : "#00cc44");
        pg.addColorStop(1, isWall ? "#003388" : "#009933");
        ctx.fillStyle = pg;
        ctx.fillRect(p.x, p.y, p.w, p.h);

        // Top edge highlight
        ctx.fillStyle = isWall ? "#66aaff" : "#66ffaa";
        ctx.fillRect(p.x, p.y, p.w, 2);
        // Bottom edge shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(p.x, p.y+p.h-2, p.w, 2);
        // Side edges
        ctx.fillStyle = isWall ? "#4488dd" : "#44dd88";
        ctx.fillRect(p.x, p.y, 1, p.h);
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(p.x+p.w-1, p.y, 1, p.h);

        // Tile grid pattern
        ctx.strokeStyle = "rgba(0,0,0,0.08)";
        ctx.lineWidth = 1;
        for (let tx = p.x + T; tx < p.x + p.w; tx += T) {
            ctx.beginPath(); ctx.moveTo(tx, p.y); ctx.lineTo(tx, p.y+p.h); ctx.stroke();
        }
        for (let ty = p.y + T; ty < p.y + p.h; ty += T) {
            ctx.beginPath(); ctx.moveTo(p.x, ty); ctx.lineTo(p.x+p.w, ty); ctx.stroke();
        }
    }

    // Moving platforms with glow trail
    const mv = lv.movers || [];
    for (let i = 0; i < mv.length; i++) {
        const m = mv[i];
        const mp = moverPos[i];
        // Motion trail
        ctx.fillStyle = "rgba(0,255,180,0.06)";
        ctx.fillRect(Math.min(mp.x, mp.prevX)-2, Math.min(mp.y, mp.prevY)-2,
            Math.abs(mp.x-mp.prevX)+m.w+4, Math.abs(mp.y-mp.prevY)+m.h+4);
        // Glow
        ctx.shadowColor = "#00ffaa";
        ctx.shadowBlur = 10;
        ctx.fillStyle = "#000";
        ctx.fillRect(mp.x, mp.y, m.w, m.h);
        ctx.shadowBlur = 0;
        // Body
        const mg = ctx.createLinearGradient(mp.x, mp.y, mp.x, mp.y + m.h);
        mg.addColorStop(0, "#00ffaa");
        mg.addColorStop(1, "#00aa66");
        ctx.fillStyle = mg;
        ctx.fillRect(mp.x, mp.y, m.w, m.h);
        // Highlight
        ctx.fillStyle = "#88ffd4";
        ctx.fillRect(mp.x, mp.y, m.w, 2);
        // Chevrons showing direction
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        if (m.dx) {
            for (let cx = mp.x+8; cx < mp.x+m.w-4; cx += 12) {
                ctx.beginPath(); ctx.moveTo(cx, mp.y+3); ctx.lineTo(cx+5, mp.y+m.h/2); ctx.lineTo(cx, mp.y+m.h-3); ctx.fill();
            }
        }
        if (m.dy) {
            for (let cy = mp.y+8; cy < mp.y+m.h-4; cy += 12) {
                ctx.beginPath(); ctx.moveTo(mp.x+3, cy); ctx.lineTo(mp.x+m.w/2, cy+5); ctx.lineTo(mp.x+m.w-3, cy); ctx.fill();
            }
        }
    }

    // Gates with energy field effect
    const gt = lv.gates || [];
    for (let i = 0; i < gt.length; i++) {
        const g = gt[i];
        if (gateOpen[i]) {
            const sw = lv.switches || [];
            let timeLeft = 99;
            for (let j = 0; j < sw.length; j++) {
                if (sw[j].gateId === g.id) timeLeft = Math.min(timeLeft, switchTimers[j]);
            }
            // Fading hologram when open
            const fade = timeLeft < 1 ? (Math.sin(gameTime * 16) * 0.3 + 0.3) : 0.08;
            ctx.fillStyle = `rgba(255,80,80,${fade})`;
            ctx.fillRect(g.x, g.y, g.w, g.h);
            ctx.strokeStyle = `rgba(255,80,80,${fade + 0.1})`;
            ctx.lineWidth = 1;
            ctx.setLineDash([3,3]);
            ctx.strokeRect(g.x, g.y, g.w, g.h);
            ctx.setLineDash([]);
        } else {
            // Solid glowing gate
            ctx.shadowColor = "#ff2222";
            ctx.shadowBlur = 8;
            ctx.fillStyle = "#000";
            ctx.fillRect(g.x, g.y, g.w, g.h);
            ctx.shadowBlur = 0;
            const gg = ctx.createLinearGradient(g.x, g.y, g.x + g.w, g.y);
            gg.addColorStop(0, "#ff3333");
            gg.addColorStop(0.5, "#ff6644");
            gg.addColorStop(1, "#ff3333");
            ctx.fillStyle = gg;
            ctx.fillRect(g.x, g.y, g.w, g.h);
            // Animated energy lines
            ctx.strokeStyle = "rgba(255,255,100,0.2)";
            ctx.lineWidth = 1;
            for (let dy = (gameTime * 30) % 8; dy < g.h; dy += 8) {
                ctx.beginPath(); ctx.moveTo(g.x, g.y+dy); ctx.lineTo(g.x+g.w, g.y+dy); ctx.stroke();
            }
        }
    }

    // Switches with glow
    const sw = lv.switches || [];
    for (let i = 0; i < sw.length; i++) {
        const s = sw[i];
        const active = switchTimers[i] > 0;
        // Glow
        if (active) {
            ctx.shadowColor = "#00ff44";
            ctx.shadowBlur = 15;
        }
        ctx.fillStyle = "#000";
        ctx.fillRect(s.x-1, s.y-1, s.w+2, s.h+2);
        const sg = ctx.createLinearGradient(s.x, s.y, s.x, s.y+s.h);
        sg.addColorStop(0, active ? "#00ff66" : "#997700");
        sg.addColorStop(1, active ? "#00aa44" : "#664400");
        ctx.fillStyle = sg;
        ctx.fillRect(s.x, s.y, s.w, s.h);
        ctx.shadowBlur = 0;
        // Pulsing ring when active
        if (active) {
            ctx.strokeStyle = `rgba(0,255,68,${0.3+Math.sin(gameTime*8)*0.2})`;
            ctx.lineWidth = 2;
            ctx.strokeRect(s.x-4, s.y-4, s.w+8, s.h+8);
        }
        // Label
        ctx.fillStyle = active ? "#000" : "#ffcc00";
        ctx.font = "bold 11px monospace";
        ctx.textAlign = "center";
        ctx.fillText(active ? "ON" : "SW", s.x + s.w/2, s.y + s.h/2 + 4);
    }

    // One-way platforms with glow
    const ows = lv.oneways || [];
    for (const ow of ows) {
        const yPos = ow.dir === "up" ? ow.y : ow.y + ow.h;
        // Glow line
        ctx.shadowColor = "#00ff88";
        ctx.shadowBlur = 6;
        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 5]);
        ctx.beginPath();
        ctx.moveTo(ow.x, yPos);
        ctx.lineTo(ow.x + ow.w, yPos);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;
        // Animated arrows
        ctx.fillStyle = "#00ff88";
        const arrowDir = ow.dir === "up" ? -1 : 1;
        const arrowOff = Math.sin(gameTime * 3) * 2;
        for (let ax = ow.x + 14; ax < ow.x + ow.w; ax += 24) {
            ctx.beginPath();
            ctx.moveTo(ax, yPos + arrowDir * 10 + arrowOff);
            ctx.lineTo(ax - 5, yPos + arrowDir * 3 + arrowOff);
            ctx.lineTo(ax + 5, yPos + arrowDir * 3 + arrowOff);
            ctx.fill();
        }
    }

    // Spikes - glowing danger blocks
    for (const s of lv.spikes) {
        const cols = Math.floor(s.w / T);
        for (let i = 0; i < cols; i++) {
            const sx = s.x + i * T;
            const blink = Math.sin(gameTime * 4 * Math.PI + i * 1.5) * 0.5 + 0.5;
            // Red glow
            ctx.shadowColor = "#ff0000";
            ctx.shadowBlur = 6 + blink * 6;
            ctx.fillStyle = "#000";
            ctx.fillRect(sx, s.y, T, s.h);
            ctx.shadowBlur = 0;
            // Body gradient
            const spg = ctx.createLinearGradient(sx, s.y, sx, s.y+s.h);
            spg.addColorStop(0, `rgb(${180+blink*75},0,0)`);
            spg.addColorStop(1, `rgb(${120+blink*50},0,0)`);
            ctx.fillStyle = spg;
            ctx.fillRect(sx, s.y, T, s.h);
            // Yellow/orange border
            ctx.strokeStyle = `rgb(255,${140+blink*60},0)`;
            ctx.lineWidth = 2;
            ctx.strokeRect(sx+1, s.y+1, T-2, s.h-2);
            // Hazard stripes
            ctx.fillStyle = `rgba(255,${180+blink*75},0,0.3)`;
            ctx.fillRect(sx+3, s.y+3, T-6, 2);
            ctx.fillRect(sx+3, s.y+s.h-5, T-6, 2);
            // "!" with glow
            ctx.fillStyle = `rgba(255,255,255,${0.7+blink*0.3})`;
            ctx.font = "bold 16px monospace";
            ctx.textAlign = "center";
            ctx.fillText("!", sx + T/2, s.y + s.h/2 + 6);
        }
    }

    // Goal - rotating star with big glow
    const goal = lv.goal;
    const pulse = .5 + Math.sin(gameTime * 4) * .5;
    const starRot = gameTime * 2;
    const xScale = Math.cos(gameTime * 3) * 0.3 + 0.7;

    // Ambient glow circle
    ctx.save();
    ctx.translate(goal.x + goal.w/2, goal.y + goal.h/2);
    const glowR = 22 + pulse * 6;
    const gg = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    gg.addColorStop(0, "rgba(255,215,0,0.3)");
    gg.addColorStop(0.5, "rgba(255,215,0,0.1)");
    gg.addColorStop(1, "rgba(255,215,0,0)");
    ctx.fillStyle = gg;
    ctx.fillRect(-glowR, -glowR, glowR*2, glowR*2);

    ctx.rotate(starRot);
    ctx.scale(xScale, 1);

    // Outer glow star
    ctx.globalAlpha = 0.25 + pulse * 0.15;
    ctx.fillStyle = "#ff0";
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
        const ang = (i / 10) * Math.PI * 2 - Math.PI/2;
        const rad = i % 2 === 0 ? 18 : 9;
        if (i === 0) ctx.moveTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
        else ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
    }
    ctx.closePath();
    ctx.fill();

    // Star body with gradient
    ctx.globalAlpha = 0.95;
    const stg = ctx.createRadialGradient(0, -3, 0, 0, 0, 14);
    stg.addColorStop(0, "#fff8e0");
    stg.addColorStop(0.4, "#ffd700");
    stg.addColorStop(1, "#cc9900");
    ctx.fillStyle = stg;
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
        const ang = (i / 10) * Math.PI * 2 - Math.PI/2;
        const rad = i % 2 === 0 ? 13 : 5;
        if (i === 0) ctx.moveTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
        else ctx.lineTo(Math.cos(ang)*rad, Math.sin(ang)*rad);
    }
    ctx.closePath();
    ctx.fill();

    // Cross sparkle
    ctx.globalAlpha = 0.5 + pulse * 0.5;
    ctx.fillStyle = "#fff";
    ctx.fillRect(-1, -8, 2, 16);
    ctx.fillRect(-8, -1, 16, 2);
    // Diagonal sparkle
    ctx.globalAlpha = pulse * 0.4;
    ctx.save();
    ctx.rotate(Math.PI/4);
    ctx.fillRect(-1, -6, 2, 12);
    ctx.fillRect(-6, -1, 12, 2);
    ctx.restore();

    ctx.globalAlpha = 1;
    ctx.restore();

    // Goal particles
    if (state === "playing" && Math.random() < .15) {
        spawn(goal.x+Math.random()*goal.w, goal.y+Math.random()*goal.h, 1, {spread:40,vy:-40,col:"#ffd700",sz:2,life:.7,grav:-60});
    }

    // Trail with glow
    for (let i = 0; i < trail.length; i++) {
        const t = trail[i];
        const alpha = (i/trail.length) * .2;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = isFlipped ? "#ff66aa" : "#ffdd00";
        const s = .5 + (i/trail.length)*.5;
        ctx.shadowColor = isFlipped ? "#ff66aa" : "#ffdd00";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(t.x+P.w/2, t.y+P.h/2, P.w*s/2, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Player - Pac-Man style with glow
    if (P.alive && !(P.invuln > 0 && Math.sin(stateT*40) > 0)) {
        const cx = P.x + P.w/2, cy = P.y + P.h/2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(P.sx, P.sy);

        const radius = 12;
        const mouthAngle = P.mouthOpen * 0.45;
        let faceAng = P.facing > 0 ? 0 : Math.PI;

        const bodyCol = isFlipped ? "#ff66aa" : "#ffdd00";
        const lightCol = isFlipped ? "#ffaacc" : "#ffee66";
        const darkCol = isFlipped ? "#cc4488" : "#ccaa00";

        // Outer glow
        ctx.shadowColor = bodyCol;
        ctx.shadowBlur = 20;
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = bodyCol;
        ctx.beginPath();
        ctx.arc(0, 0, radius + 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Pac-Man body with gradient
        const pbg = ctx.createRadialGradient(-2, -3, 0, 0, 0, radius);
        pbg.addColorStop(0, lightCol);
        pbg.addColorStop(0.7, bodyCol);
        pbg.addColorStop(1, darkCol);
        ctx.fillStyle = pbg;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, faceAng + mouthAngle, faceAng + Math.PI * 2 - mouthAngle);
        ctx.closePath();
        ctx.fill();

        // Outline
        ctx.strokeStyle = darkCol;
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Specular highlight
        ctx.globalAlpha = 0.4;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(-3, -4, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Eye with shine
        const eyeOffX = P.facing * 3;
        const eyeOffY = P.gd > 0 ? -4 : 4;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(eyeOffX, eyeOffY, 3.5, 0, Math.PI * 2);
        ctx.fill();
        // Pupil
        ctx.fillStyle = "#112";
        ctx.beginPath();
        ctx.arc(eyeOffX + P.facing * 1.5, eyeOffY, 1.8, 0, Math.PI * 2);
        ctx.fill();
        // Eye shine
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(eyeOffX + P.facing * 0.5, eyeOffY - 1.5, 0.8, 0, Math.PI * 2);
        ctx.fill();

        // Flipped: distressed eyebrow
        if (isFlipped) {
            ctx.strokeStyle = "#cc4488";
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(eyeOffX - 5, eyeOffY - (P.gd > 0 ? 7 : -7));
            ctx.lineTo(eyeOffX + 5, eyeOffY - (P.gd > 0 ? 4 : -4));
            ctx.stroke();
        }

        ctx.restore();
    }

    // Particles
    for (const p of parts) {
        ctx.globalAlpha = clamp(p.life/p.max, 0, 1);
        if (p.text) {
            ctx.fillStyle = p.col;
            ctx.font = "bold 14px monospace";
            ctx.textAlign = "center";
            ctx.fillText(p.text, p.x, p.y);
        } else {
            ctx.fillStyle = p.col;
            // Square pixels
            ctx.fillRect(p.x-p.sz/2, p.y-p.sz/2, p.sz, p.sz);
        }
    }
    ctx.globalAlpha = 1;

    // HUD
    if (state === "playing" || state === "level_complete") {
        ctx.fillStyle = "#0f4"; ctx.globalAlpha = .7;
        ctx.font = "bold 13px monospace"; ctx.textAlign = "left";
        ctx.fillText(`${lvlIdx+1}/${levels.length}  ${lv.name}`, 10, 20);

        ctx.textAlign = "right";
        ctx.fillText(`FLIPS: ${flipCount}`, W-10, 20);
        ctx.fillText(`TIME: ${Math.floor(levelTime)}s`, W-10, 36);

        // Gravity indicator
        ctx.globalAlpha = .7;
        ctx.font = "18px monospace";
        ctx.fillStyle = isFlipped ? "#f4a" : "#0f4";
        ctx.fillText(isFlipped ? "▲ REVERSED" : "▼ NORMAL", W-10, 55);
        if (P.flipLocked) {
            ctx.fillStyle = "#f44";
            ctx.fillText("FLIP LOCKED", W-10, 72);
        }
        ctx.globalAlpha = 1;

        // Hint
        if (lv.hint && stateT < 4) {
            ctx.globalAlpha = Math.min(1, 4-stateT);
            ctx.textAlign = "center"; ctx.font = "14px monospace";
            ctx.fillStyle = "#0f4";
            ctx.fillText(lv.hint, W/2, H-20);
            ctx.globalAlpha = 1;
        }
        ctx.textAlign = "left";
    }

    // Level complete overlay with score
    if (state === "level_complete") {
        ctx.globalAlpha = Math.min(.6, stateT*.4);
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha = Math.min(1, stateT*2);

        ctx.fillStyle = "#ffd700"; ctx.font = "bold 36px monospace"; ctx.textAlign = "center";
        ctx.fillText("LEVEL CLEAR!", W/2, H/2 - 70);

        const sc = calcScore();
        const grade = getGrade(sc.total);
        const gradeCol = grade==="S"?"#ffd700":grade==="A"?"#00ff44":grade==="B"?"#44aaff":"#aaa";

        ctx.font = "16px monospace";
        ctx.fillStyle = "#0f4";
        let sy = H/2 - 30;
        ctx.fillText(`Base: ${sc.base}`, W/2, sy); sy += 22;
        ctx.fillStyle = sc.flipBonus > 0 ? "#ff0" : "#666";
        ctx.fillText(`Flip Bonus: ${sc.flipBonus}`, W/2, sy); sy += 22;
        ctx.fillStyle = sc.timeBonus > 0 ? "#ff0" : "#666";
        ctx.fillText(`Time Bonus: ${sc.timeBonus}`, W/2, sy); sy += 22;
        ctx.fillStyle = sc.deathBonus > 0 ? "#ff0" : "#666";
        ctx.fillText(`No-Death Bonus: ${sc.deathBonus}`, W/2, sy); sy += 30;

        ctx.font = "bold 24px monospace";
        ctx.fillStyle = gradeCol;
        ctx.fillText(`GRADE: ${grade}  |  TOTAL: ${sc.total}`, W/2, sy);

        ctx.fillStyle = "#888"; ctx.font = "12px monospace";
        ctx.fillText("press any key to continue", W/2, sy + 30);

        ctx.globalAlpha = 1; ctx.textAlign = "left";
    }

    // Win screen
    if (state === "win") {
        ctx.globalAlpha = Math.min(.7, stateT*.3);
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,W,H);
        ctx.globalAlpha = Math.min(1, stateT);
        ctx.fillStyle = "#ffd700"; ctx.font = "bold 48px monospace"; ctx.textAlign = "center";
        ctx.fillText("YOU WIN!", W/2, H/2-60);
        ctx.fillStyle = "#0f4"; ctx.font = "bold 20px monospace";
        ctx.fillText(`TOTAL SCORE: ${totalScore}`, W/2, H/2 - 15);
        ctx.fillStyle = "#fff"; ctx.font = "16px monospace";
        const totalFlips = bestFlips.reduce((a,b)=>a+(b||0),0);
        ctx.fillText(`Best flips across all levels: ${totalFlips}`, W/2, H/2+15);
        ctx.fillStyle = "#888"; ctx.font = "14px monospace";
        ctx.fillText("Press R to play again", W/2, H/2+50);
        ctx.globalAlpha = 1; ctx.textAlign = "left";
        if (Math.random()<.15) spawn(Math.random()*W, Math.random()*H, 2, {spread:100,vy:-50,col:`hsl(${Math.random()*360},80%,60%)`,sz:4,life:.8,grav:-100});
    }

    // Flash
    if (flash > 0) {
        ctx.globalAlpha = flash * .4;
        ctx.fillStyle = isFlipped ? "#f0f" : "#0ff";
        ctx.fillRect(0,0,W,H);
        ctx.globalAlpha = 1;
    }
    if (deathFlash > 0) {
        ctx.globalAlpha = deathFlash;
        ctx.fillStyle = "#f00";
        ctx.fillRect(0,0,W,H);
        ctx.globalAlpha = 1;
    }

    composite();
}

function renderTitle(ctx) {
    const titleY = 85 + Math.sin(stateT*1.5)*6;

    // Animated background energy
    for (let i = 0; i < 3; i++) {
        const wave = Math.sin(stateT * 0.5 + i * 2) * 0.03 + 0.04;
        ctx.fillStyle = `rgba(0,255,68,${wave})`;
        const wy = Math.sin(stateT * 0.3 + i) * 50 + H/2;
        ctx.fillRect(0, wy - 30, W, 60);
    }

    ctx.save();
    ctx.translate(W/2, titleY);
    const s = 1 + Math.sin(stateT*2)*.03;
    ctx.scale(s, s);

    // Title glow
    ctx.shadowColor = "#00ff44";
    ctx.shadowBlur = 30;
    ctx.fillStyle = "#003300";
    ctx.font = "bold 54px monospace"; ctx.textAlign = "center";
    ctx.fillText("GRAVITY FLIP", 0, 0);
    ctx.shadowBlur = 15;

    // Title with animated gradient
    const tGrad = ctx.createLinearGradient(-220,-20,220,20);
    const hueShift = Math.sin(stateT * 0.5) * 0.2;
    tGrad.addColorStop(0, "#00ff44");
    tGrad.addColorStop(0.3 + hueShift, "#44ffaa");
    tGrad.addColorStop(0.5, "#ffd700");
    tGrad.addColorStop(0.7 - hueShift, "#44ffaa");
    tGrad.addColorStop(1, "#00ff44");
    ctx.fillStyle = tGrad;
    ctx.fillText("GRAVITY FLIP", 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();

    // Subtitle with typewriter effect
    ctx.fillStyle = "#00cc44"; ctx.font = "14px monospace";
    ctx.textAlign = "center";
    const sub = "What goes up must come down... unless you flip it.";
    const chars = Math.min(sub.length, Math.floor(stateT * 20));
    ctx.fillText(sub.substring(0, chars), W/2, titleY + 38);

    // Demo Pac-Man
    const demoX = W/2;
    const demoPhase = stateT % 3;
    let demoY, demoGD;
    if (demoPhase < 1.5) { demoY = 210 + Math.pow(demoPhase/1.5, 2) * 70; demoGD = 1; }
    else { demoY = 280 - Math.pow((demoPhase-1.5)/1.5, 2) * 70; demoGD = -1; }

    // Demo platforms with glow
    ctx.shadowColor = "#00ff44";
    ctx.shadowBlur = 8;
    ctx.fillStyle = "#00ff44";
    ctx.fillRect(W/2-60, 288, 120, 4);
    ctx.fillRect(W/2-60, 200, 120, 4);
    ctx.shadowBlur = 0;

    // Demo pac-man with glow
    const demoCol = demoGD > 0 ? "#ffdd00" : "#ff66aa";
    ctx.shadowColor = demoCol;
    ctx.shadowBlur = 12;
    ctx.fillStyle = demoCol;
    ctx.beginPath();
    const mAng = Math.sin(stateT * 10) * 0.3;
    ctx.moveTo(demoX, demoY);
    ctx.arc(demoX, demoY, 13, mAng, Math.PI * 2 - mAng);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    // Eye
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(demoX + 3, demoY + (demoGD > 0 ? -4 : 4), 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(demoX + 4, demoY + (demoGD > 0 ? -4 : 4), 1.2, 0, Math.PI*2);
    ctx.fill();

    // Flip flash with particle burst
    if (Math.abs(demoPhase - 1.5) < .1) {
        ctx.globalAlpha = .3;
        const fg = ctx.createRadialGradient(demoX, 240, 0, demoX, 240, 60);
        fg.addColorStop(0, "#0ff");
        fg.addColorStop(1, "rgba(0,255,255,0)");
        ctx.fillStyle = fg;
        ctx.fillRect(W/2-60, 195, 120, 95);
        ctx.globalAlpha = 1;
    }

    // Instructions
    ctx.shadowColor = "#00ff44";
    ctx.shadowBlur = 6;
    ctx.fillStyle = "#00ff44"; ctx.globalAlpha = .6+Math.sin(stateT*3)*.3;
    ctx.font = "bold 18px monospace"; ctx.textAlign = "center";
    ctx.fillText(isTouch ? "Tap to start" : "Press any key to start", W/2, 340);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    ctx.fillStyle = "#00aa33"; ctx.font = "12px monospace";
    if (!isTouch) {
        ctx.fillText("ARROWS move \u00B7 SPACE jump \u00B7 SHIFT flip \u00B7 R restart", W/2, 370);
    }

    // Fullscreen hint for mobile
    if (isTouch && !isFullscreen && !isStandalone) {
        const hintY = 375;
        ctx.fillStyle = "rgba(255,200,0,0.1)";
        ctx.beginPath();
        ctx.roundRect(W/2 - 190, hintY - 14, 380, isIOS ? 44 : 22, 6);
        ctx.fill();
        ctx.fillStyle = "#ffcc00"; ctx.font = "bold 11px monospace";
        if (isIOS) {
            ctx.fillText("For fullscreen: tap Share \u2192 Add to Home Screen", W/2, hintY);
            ctx.fillText("then open from your home screen", W/2, hintY + 16);
        } else {
            ctx.fillText("Tap for fullscreen \u00B7 or use \u22EE menu \u2192 Add to Home Screen", W/2, hintY);
        }
    }

    // Level count badge
    ctx.fillStyle = "rgba(0,255,68,0.08)";
    ctx.beginPath();
    ctx.roundRect(W/2 - 180, 420, 360, 30, 8);
    ctx.fill();
    ctx.fillStyle = "#0f4"; ctx.font = "bold 14px monospace";
    ctx.fillText(`${levels.length} LEVELS \u00B7 5 PHASES \u00B7 NEW MECHANICS`, W/2, 440);

    ctx.textAlign = "left";
}

// ===== CRT COMPOSITE =====
function composite() {
    // Draw offscreen buffer to main canvas
    $.drawImage(offC, 0, 0);

    // Phosphor glow — draw offset copies with additive blending
    $.globalCompositeOperation = "lighter";
    $.globalAlpha = 0.06;
    $.drawImage(offC, 1, 0);
    $.drawImage(offC, -1, 0);
    $.globalAlpha = 0.04;
    $.drawImage(offC, 0, 1);
    $.drawImage(offC, 2, 0);
    $.globalAlpha = 1;
    $.globalCompositeOperation = "source-over";

    // Scanlines (every 2px, subtle)
    $.fillStyle = "rgba(0,0,0,0.12)";
    for (let y = 0; y < H; y += 2) {
        $.fillRect(0, y, W, 1);
    }

    // RGB sub-pixel hint (very subtle color fringing)
    $.globalCompositeOperation = "multiply";
    $.globalAlpha = 0.03;
    $.fillStyle = "#ff8888";
    $.fillRect(0, 0, W/3, H);
    $.fillStyle = "#88ff88";
    $.fillRect(W/3, 0, W/3, H);
    $.fillStyle = "#8888ff";
    $.fillRect(W*2/3, 0, W/3, H);
    $.globalAlpha = 1;
    $.globalCompositeOperation = "source-over";

    // Vignette — deeper and more dramatic
    const vg = $.createRadialGradient(W/2, H/2, W*0.25, W/2, H/2, W*0.72);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(0.7, "rgba(0,0,0,0.15)");
    vg.addColorStop(1, "rgba(0,0,0,0.6)");
    $.fillStyle = vg;
    $.fillRect(0, 0, W, H);

    // Cabinet bezel
    renderBezel();
}

function renderBezel() {
    const bw = 6;

    // Bezel frame with gradient
    const bz = $.createLinearGradient(0, 0, 0, H);
    bz.addColorStop(0, "#222");
    bz.addColorStop(0.5, "#1a1a1a");
    bz.addColorStop(1, "#111");
    $.fillStyle = bz;
    $.fillRect(0, 0, W, bw);
    $.fillRect(0, H - bw, W, bw);
    $.fillRect(0, 0, bw, H);
    $.fillRect(W - bw, 0, bw, H);

    // Inner neon border
    $.shadowColor = "#00ff44";
    $.shadowBlur = 4;
    $.strokeStyle = "#00ff44";
    $.lineWidth = 1;
    $.globalAlpha = 0.4;
    $.strokeRect(bw, bw, W - bw*2, H - bw*2);
    $.shadowBlur = 0;
    $.globalAlpha = 1;

    // Corner screws with metallic look
    const screwPositions = [[4,4],[W-4,4],[4,H-4],[W-4,H-4]];
    for (const [sx,sy] of screwPositions) {
        const sg = $.createRadialGradient(sx-1, sy-1, 0, sx, sy, 3.5);
        sg.addColorStop(0, "#666");
        sg.addColorStop(0.6, "#444");
        sg.addColorStop(1, "#222");
        $.fillStyle = sg;
        $.beginPath();
        $.arc(sx, sy, 3.5, 0, Math.PI*2);
        $.fill();
        $.strokeStyle = "#555";
        $.lineWidth = 0.8;
        $.beginPath();
        $.moveTo(sx-2, sy-2);
        $.lineTo(sx+2, sy+2);
        $.stroke();
        $.beginPath();
        $.moveTo(sx+2, sy-2);
        $.lineTo(sx-2, sy+2);
        $.stroke();
    }

    // Speaker grille dots
    $.fillStyle = "#1a1a1a";
    for (let i = 0; i < 7; i++) {
        for (let j = 0; j < 2; j++) {
            $.fillRect(W/2 - 24 + i*8, H - 5 + j*2, 3, 1);
        }
    }
}

// ===== GAME LOOP =====
const TICK = 1/120;
let acc = 0, lt = 0;
function loop(ts) {
    const dt = Math.min((ts-lt)/1000, .1);
    lt = ts; acc += dt;
    while (acc >= TICK) {
        update(TICK);
        for (const k in jp) delete jp[k];
        acc -= TICK;
    }
    render();
    requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { lt = ts; requestAnimationFrame(loop); });
</script>
